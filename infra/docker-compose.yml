# ---------------------------------------------------------------------
# Shared Environment Variables
# ---------------------------------------------------------------------

x-django-env: &django-env
  DJANGO_SETTINGS_MODULE: "config.settings.production"

  DATABASE_URL: "postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@${POSTGRES_HOST:-db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-django}"

  REDIS_URL: "redis://redis:6379/0"

  CELERY_BROKER_URL: "redis://redis:6379/0"
  CELERY_RESULT_BACKEND: "redis://redis:6379/1"

x-db-env: &db-env
  POSTGRES_USER: "${POSTGRES_USER:-postgres}"
  POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
  POSTGRES_DB: "${POSTGRES_DB:-django}"
  POSTGRES_HOST: "${POSTGRES_HOST:-db}"
  POSTGRES_PORT: "${POSTGRES_PORT:-5432}"

# ---------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------

services:

  web:
    build:
      context: .
      dockerfile: infra/Dockerfile

    container_name: django_web

    command: >
      gunicorn
      config.wsgi:application
      --bind 0.0.0.0:8000
      --workers 4
      --threads 2

    ports:
      - "${DJANGO_PORT:-8000}:8000"

    env_file:
      - .env

    environment:
      <<: *django-env

    depends_on:
      db:
        condition: service_healthy

      redis:
        condition: service_healthy

  celery:
    build:
      context: .
      dockerfile: infra/Dockerfile

    container_name: django_celery

    command: >
      celery
      -A config
      worker
      --loglevel=info

    env_file:
      - .env

    environment:
      <<: *django-env

    depends_on:
      db:
        condition: service_healthy

      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: .
      dockerfile: infra/Dockerfile

    container_name: django_celery_beat

    command: >
      celery
      -A config
      beat
      --loglevel=info

    env_file:
      - .env

    environment:
      <<: *django-env

    depends_on:
      db:
        condition: service_healthy

      redis:
        condition: service_healthy

  redis:
    image: redis:8-alpine

    container_name: redis

    restart: unless-stopped

    ports:
      - "6379:6379"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  db:
    image: postgres:16

    container_name: postgres

    restart: always

    environment: *db-env

    ports:
      - "${POSTGRES_PORT:-5432}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-django}"
        ]
      interval: 5s
      timeout: 5s
      retries: 10

# ---------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------

volumes:
  postgres_data: